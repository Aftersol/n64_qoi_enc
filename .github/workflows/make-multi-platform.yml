name: Make on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      working-directory: tools
      run: make

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      working-directory: tools
      run: make

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      working-directory: tools
      shell: bash
      run: make
        